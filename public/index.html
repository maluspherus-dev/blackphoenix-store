<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackPhoenix Store</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 60px 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 500px;
    }
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #ff6b6b;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #b0b0b0;
    }
    .status {
      background: rgba(76, 175, 80, 0.3);
      border-left: 4px solid #4caf50;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 5px;
      text-align: left;
    }
    .status-text {
      color: #4caf50;
      font-weight: bold;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8e72 100%);
      color: white;
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      margin: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
    }
    .info {
      margin-top: 30px;
      font-size: 14px;
      color: #999;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔥</div>
    <h1>BlackPhoenix Store</h1>
    <p>Sua plataforma de anúncios online</p>
    
    <div class="status">
      <div class="status-text">✅ Servidor Online</div>
      <div>Tudo funcionando perfeitamente!</div>
    </div>
    
    <button class="button" onclick="verificarAPI()">🧪 Testar API</button>
    
    <div class="info">
      <p>🚀 Seu site está ao vivo!</p>
      <p id="status"></p>
    </div>
  </div>

  <script>
    async function verificarAPI() {
      try {
        const response = await fetch('/health');
        const data = await response.json();
        document.getElementById('status').innerHTML = '✅ API respondendo normalmente!';
        alert('✅ Servidor está funcionando!\n\n' + JSON.stringify(data, null, 2));
      } catch (error) {
        document.getElementById('status').innerHTML = '❌ Erro ao conectar';
        alert('❌ Erro: ' + error.message);
      }
    }
  </script>
</body>
</html>
