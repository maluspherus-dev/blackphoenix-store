services:
  - type: web
    name: blackphoenix-store
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: blackphoenix-db
          property: connectionString

databases:
  - name: blackphoenix-db
    databaseName: blackphoenix_db
    plan: free
